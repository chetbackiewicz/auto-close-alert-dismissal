name: Close Low Severity Delegated Approvals (Repo)

on:
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  close-low-severity-approvals:
    name: Auto-dismiss Medium/Low severity alerts (repo)
    runs-on: ubuntu-latest
    steps:
      - name: Process open dismissal requests
        env:
          GH_TOKEN: ${{ secrets.DISMISSAL_SECRET }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          DISMISSAL_MESSAGE: 'Automatically Dismissed using the "Low Severity Delegated Approval" action due to low severity.'
        run: |
          set -euo pipefail

          echo "::group::Fetching open dismissal requests for ${OWNER}/${REPO}"

          reviewed=0
          dismissed=0
          skipped=0
          errors=0
          page=1

          while true; do
            response=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${OWNER}/${REPO}/dismissal-requests/code-scanning?per_page=100&page=${page}" \
              2>&1) || {
              echo "::error::Failed to fetch dismissal requests (page ${page}): ${response}"
              exit 1
            }

            count=$(echo "$response" | jq 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi

            echo "Page ${page}: found ${count} dismissal request(s)"

            # Process each dismissal request
            for row in $(echo "$response" | jq -r '.[] | @base64'); do
              _jq() {
                echo "$row" | base64 --decode | jq -r "$1"
              }

              alert_number=$(_jq '.data[0].alert_number')
              request_id=$(_jq '.id')

              if [ -z "$alert_number" ] || [ "$alert_number" = "null" ]; then
                echo "::warning::Dismissal request ${request_id} has no alert_number, skipping"
                skipped=$((skipped + 1))
                continue
              fi

              reviewed=$((reviewed + 1))
              echo "---"
              echo "Reviewing dismissal request #${request_id} for ${OWNER}/${REPO} alert #${alert_number}"

              # Fetch the code scanning alert to check severity
              alert_response=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${OWNER}/${REPO}/code-scanning/alerts/${alert_number}" \
                2>&1) || {
                echo "::warning::Failed to fetch alert #${alert_number}: ${alert_response}"
                errors=$((errors + 1))
                continue
              }

              severity=$(echo "$alert_response" | jq -r '.rule.security_severity_level // .rule.severity // "unknown"')
              echo "  Alert severity: ${severity}"

              if [ "$severity" = "medium" ] || [ "$severity" = "low" ]; then
                echo "  Severity is ${severity} — approving dismissal request"

                # Approve the dismissal request (auto-dismisses the alert)
                approve_result=$(gh api \
                  -X PATCH \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "/repos/${OWNER}/${REPO}/dismissal-requests/code-scanning/${alert_number}" \
                  -f status=approve \
                  -f message="${DISMISSAL_MESSAGE}" \
                  2>&1) || {
                  echo "::warning::Failed to approve dismissal request for alert #${alert_number}: ${approve_result}"
                  errors=$((errors + 1))
                  continue
                }

                echo " Dismissal request approved"
                dismissed=$((dismissed + 1))
              else
                echo "  Severity is ${severity} — skipping (not medium or low)"
                skipped=$((skipped + 1))
              fi
            done

            # Next page
            if [ "$count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          echo "::endgroup::"

          echo ""
          echo "===== Summary ====="
          echo "Dismissal requests reviewed: ${reviewed}"
          echo "Alerts dismissed (medium/low): ${dismissed}"
          echo "Skipped (other severity):     ${skipped}"
          echo "Errors:                        ${errors}"

          if [ "$errors" -gt 0 ]; then
            echo "::warning::Completed with ${errors} error(s). Check logs above for details."
          fi

